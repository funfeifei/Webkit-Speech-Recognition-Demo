<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webkit Speech Recognition Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
        }
        #result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            min-height: 50px;
        }
    </style>
</head>
<body>
    <h1>Webkit Speech Recognition Demo</h1>
    <p>This demo uses the Web Speech API to recognize speech. Click "Start Listening" and speak into your microphone.</p>
    <button id="start-btn">Start Listening</button>
    <button id="stop-btn" disabled>Stop Listening</button>
    <div id="result">Speech recognition result will appear here...</div>
    <div id="status">Status: Ready</div>

    <h2>Text to Speech</h2>
    <label for="voice-select">选择语音：</label>
    <select id="voice-select"></select><br>
    <textarea id="text-input" rows="4" cols="50" placeholder="Enter text to speak..."></textarea><br>
    <button id="speak-btn">Speak Text</button>
    <button id="stop-speak-btn" disabled>Stop Speaking</button>
    <script>
        // Check for browser support
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            document.getElementById('result').textContent = 'Speech recognition not supported in this browser.';
        } else {
            const recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'zh-CN'; // Set to Chinese

            const startBtn = document.getElementById('start-btn');
            const stopBtn = document.getElementById('stop-btn');
            const resultDiv = document.getElementById('result');
            const statusDiv = document.getElementById('status');

            startBtn.addEventListener('click', () => {
                recognition.start();
                startBtn.disabled = true;
                stopBtn.disabled = false;
                resultDiv.textContent = '';
                statusDiv.textContent = 'Status: Listening...';
            });

            stopBtn.addEventListener('click', () => {
                recognition.stop();
                startBtn.disabled = false;
                stopBtn.disabled = true;
                statusDiv.textContent = 'Status: Stopped';
            });

            recognition.onstart = () => {
                statusDiv.textContent = 'Status: Listening...';
            };

            recognition.onresult = (event) => {
                let finalTranscript = '';
                let interimTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript;
                    } else {
                        interimTranscript += transcript;
                    }
                }

                if (finalTranscript) {
                    resultDiv.innerHTML = '<strong>识别结果：</strong>' + finalTranscript;
                } else if (interimTranscript) {
                    resultDiv.innerHTML = '<em>正在识别：</em>' + interimTranscript;
                }
            };

            recognition.onend = () => {
                startBtn.disabled = false;
                stopBtn.disabled = true;
                statusDiv.textContent = 'Status: Ready';
            };

            recognition.onerror = (event) => {
                resultDiv.textContent = 'Error: ' + event.error;
                statusDiv.textContent = 'Status: Error - ' + event.error;
                startBtn.disabled = false;
                stopBtn.disabled = true;
            };
        }

        // Text to Speech functionality
        if ('speechSynthesis' in window) {
            const textInput = document.getElementById('text-input');
            const speakBtn = document.getElementById('speak-btn');
            const stopSpeakBtn = document.getElementById('stop-speak-btn');
            const voiceSelect = document.getElementById('voice-select');

            let voices = [];

            function populateVoiceList() {
                voices = speechSynthesis.getVoices();
                voiceSelect.innerHTML = '';

                voices.forEach((voice, index) => {
                    const option = document.createElement('option');
                    option.value = index;
                    option.textContent = `${voice.name} (${voice.lang})`;
                    if (voice.lang.includes('zh')) {
                        option.selected = true; // Default to Chinese voice
                    }
                    voiceSelect.appendChild(option);
                });
            }

            // Voices might not be loaded immediately
            populateVoiceList();
            if (speechSynthesis.onvoiceschanged !== undefined) {
                speechSynthesis.onvoiceschanged = populateVoiceList;
            }

            speakBtn.addEventListener('click', () => {
                const text = textInput.value.trim();
                if (text) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    const selectedVoice = voices[voiceSelect.value];
                    if (selectedVoice) {
                        utterance.voice = selectedVoice;
                    }
                    utterance.rate = 1;
                    utterance.pitch = 1;
                    utterance.volume = 1;

                    // Add event listeners to the utterance
                    utterance.onend = () => {
                        speakBtn.disabled = false;
                        stopSpeakBtn.disabled = true;
                    };

                    utterance.onerror = (event) => {
                        console.error('Speech synthesis error:', event.error);
                        speakBtn.disabled = false;
                        stopSpeakBtn.disabled = true;
                    };

                    speechSynthesis.speak(utterance);
                    speakBtn.disabled = true;
                    stopSpeakBtn.disabled = false;
                }
            });

            stopSpeakBtn.addEventListener('click', () => {
                speechSynthesis.cancel();
                speakBtn.disabled = false;
                stopSpeakBtn.disabled = true;
            });

            // Remove global event handlers since we handle them per utterance
            // speechSynthesis.onend = () => {
            //     speakBtn.disabled = false;
            //     stopSpeakBtn.disabled = true;
            // };

            // speechSynthesis.onerror = (event) => {
            //     console.error('Speech synthesis error:', event.error);
            //     speakBtn.disabled = false;
            //     stopSpeakBtn.disabled = true;
            // };
        } else {
            document.getElementById('speak-btn').disabled = true;
            document.getElementById('speak-btn').textContent = 'Text to Speech not supported';
        }
    </script>
</body>
</html>
